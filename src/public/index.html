<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CatalogPRO v2 - LOMHIFAR</title>
  <link rel="stylesheet" href="/styles.css">

  <!-- I: PWA - manifest + meta para móvil -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#cc007a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CatalogPRO">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- H: Leaflet para mapas (CDN oficial, sin API key) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""
        defer></script>
</head>
<body>
  <div id="app">
    <div id="loading" class="loading">Cargando…</div>
  </div>

  <!-- I: IndexedDB wrapper (cargar antes de app.js) -->
  <script src="/db.js"></script>
  <script src="/app.js"></script>

  <!-- I: registrar Service Worker para modo offline -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('[PWA] Service Worker registrado', reg.scope))
          .catch((err) => console.warn('[PWA] Error registrando SW:', err));
      });
    }
  </script>
</body>
</html>
